services:
  - type: web
    name: houseland
    runtime: node
    plan: free
    buildCommand: npm run build:render
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: VITE_API_URL
        value: ""
